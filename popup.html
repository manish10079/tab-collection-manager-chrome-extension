<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Collection Manager</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <span class="creator">By Mkn Labs  v1.5.0</span>
    <header class="header">
      
      <h1><i class="fas fa-layer-group"></i> Tab Collections</h1>
      <p class="subtitle">Auto‑save & organize your browsing sessions</p>
    
    </header>

    <div class="scrollable-content">
      <div class="controls">        <div class="compact-controls-row">
          <!-- Default Actions Bar -->
          <div class="actions-bar-default" id="actionsBarDefault">
            <button class="icon-btn" id="toggleSearchBtn" title="Search Collections or Tabs">
              <i class="fas fa-search"></i>
            </button>
            <button class="icon-btn" id="toggleCreateBtn" title="Create New Collection">
              <i class="fas fa-plus"></i>
            </button>
            <button class="icon-btn" id="globalImportBtn" title="Import All Collections (JSON)">
              <i class="fas fa-file-import"></i>
            </button>
            <button class="icon-btn" id="globalExportBtn" title="Export All Collections (JSON)">
              <i class="fas fa-file-export"></i>
            </button>
            <!-- Restore button — visible only when a backup exists -->
            <div class="restore-btn-wrapper hidden" id="restoreBackupWrapper">
              <button id="restoreBackupBtn" class="icon-btn btn-restore" title="Restore Previous Session">
                <i class="fas fa-undo"></i>
              </button>
              <!-- Hover tooltip populated by JS -->
              <div class="restore-tooltip" id="restoreTooltipContent"></div>
            </div>
            <!-- Sort collections dropdown -->
            <div class="sort-collections-container">
              <button class="icon-btn sort-collections-btn" title="Sort Collections">
                <i class="fas fa-sort"></i>
              </button>
              <div class="sort-dropdown-menu hidden" id="collectionsSortMenu">
                <div class="sort-option active" data-value="custom"><i class="fas fa-grip-vertical"></i> Custom Order</div>
                <div class="sort-option" data-value="lastModified"><i class="fas fa-clock"></i> Last Modified</div>
                <div class="sort-option" data-value="nameAsc"><i class="fas fa-sort-alpha-down"></i> Name (A-Z)</div>
                <div class="sort-option" data-value="nameDesc"><i class="fas fa-sort-alpha-up"></i> Name (Z-A)</div>
                <div class="sort-option" data-value="dateCreated"><i class="fas fa-calendar-plus"></i> Date Created</div>
                <div class="sort-option" data-value="tabCount"><i class="fas fa-list-ol"></i> Tab Count</div>
              </div>
            </div>
          </div>

          <!-- Dynamic Search Input -->
          <div class="input-slide-container hidden" id="searchSlideContainer">
            <div class="input-wrapper search-wrapper">
              <input type="text" id="searchBox" placeholder="Search collections or tabs…" autocomplete="off" spellcheck="false" />
              <button class="icon-btn input-action-btn" id="clearSearchBtn" title="Clear &amp; Close">
                <i class="fas fa-times"></i>
              </button>
            </div>
          </div>

          <!-- Dynamic Create Collection Input -->
          <div class="input-slide-container hidden" id="createSlideContainer">
            <div class="input-wrapper create-wrapper">
              <input type="text" id="newCollectionName" placeholder="New collection name" maxlength="50" autocomplete="off" spellcheck="false" />
              <button class="icon-btn input-action-btn success-btn" id="createCollection" title="Create">
                <i class="fas fa-check"></i>
              </button>
              <button class="icon-btn input-action-btn cancel-btn" id="cancelCreateBtn" title="Cancel">
                <i class="fas fa-times"></i>
              </button>
            </div>
          </div>
        </div>
        <div class="auto-save-section">
          <label class="checkbox-label">
            <input type="checkbox" id="autoSaveToggle">
            <span>Enable Auto‑Save to Current Session</span>
          </label>
          <label class="checkbox-label ram-saver-label" title="When enabled, restored tabs load in the background and only fully load when you click on them — saving RAM.">
            <input type="checkbox" id="ramSaverToggle">
            <span>RAM Saver <span class="ram-saver-badge">💾 Lazy Load</span></span>
          </label>
        </div>
      </div>

      <div class="collections-container" id="collectionsContainer">
        <!-- Collections will be rendered here -->
        <div class="empty-state" id="emptyState">
          <i class="fas fa-inbox"></i>
          <h3>No collections yet</h3>
          <p>Create your first collection to start organizing tabs</p>
        </div>
      </div>

      <!-- Global search results (shown instead of collectionsContainer when a query is active) -->
      <div id="searchResultsContainer" class="search-results-container"></div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <div class="modal-overlay" id="addTabsModal" style="display: none;">
      <div class="modal">
        <div class="modal-header">
          <h3><i class="fas fa-plus-circle"></i> Add Tabs</h3>
          <button class="close-modal" id="closeModal">&times;</button>
        </div>
        <div class="modal-body">
          <div class="tab-mode-selector">
            <button class="mode-btn active" data-mode="manual">Manual</button>
            <button class="mode-btn" data-mode="multi">Multi‑Select</button>
          </div>

          <div class="tab-form manual-form" id="manualForm">
            <div class="form-group">
              <label for="tabTitle">Title</label>
              <input type="text" id="tabTitle" placeholder="Enter tab title">
            </div>
            <div class="form-group">
              <label for="tabUrl">URL</label>
              <input type="url" id="tabUrl" placeholder="https://example.com">
            </div>
            <button class="btn-secondary" id="addManualTab">
              <i class="fas fa-plus"></i> Add Tab
            </button>
          </div>

          <div class="tab-form multi-form" id="multiForm" style="display: none;">
            <div class="select-all-row">
              <label class="checkbox-label">
                <input type="checkbox" id="selectAllTabs">
                <span>Select All Tabs</span>
              </label>
            </div>
            <div class="open-tabs-list" id="openTabsList">
              <!-- Open tabs will be listed here -->
            </div>
            <button class="btn-secondary" id="addSelectedTabs">
              <i class="fas fa-check-double"></i> Add Selected
            </button>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-outline" id="cancelModal">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Duplicate URL Confirmation Dialog -->
    <div class="modal-overlay" id="duplicateUrlDialog" style="display: none;">
      <div class="modal duplicate-dialog">
        <div class="modal-header">
          <h3><i class="fas fa-exclamation-triangle"></i> Duplicate URL Found</h3>
          <button class="close-modal" id="closeDuplicateDialog">&times;</button>
        </div>
        <div class="modal-body duplicate-dialog-body">
          <div id="duplicateUrlMessage" class="duplicate-message"></div>
          <div id="duplicateUrlList" class="duplicate-collection-list"></div>
        </div>
        <div class="modal-footer duplicate-dialog-footer">
          <button class="btn-outline" id="duplicateCancelBtn">Cancel</button>
          <button class="btn-secondary" id="duplicateConfirmBtn">
            <i class="fas fa-plus"></i> Add Anyway
          </button>
        </div>
      </div>
    </div>
  </div>

  <template id="collectionTemplate">
    <div class="collection" data-id="" draggable="false">
      <div class="collection-header">
        <div class="collection-left-section">
          <div class="collection-drag-handle drag-handle" title="Drag to reorder collection">
            <i class="fas fa-grip-vertical"></i>
          </div>
          <button class="expand-btn">
            <i class="fas fa-chevron-right"></i>
          </button>
          <input type="text" class="collection-name" value="" maxlength="50" readonly>
        </div>
        <div class="collection-right-section">
          <div class="collection-meta">
            <span class="tab-count">0 tabs</span>
            <span class="meta-dot">•</span>
            <span class="updated-time">just now</span>
          </div>
          <div class="collection-actions">
            <button class="icon-btn open-all-tabs-btn" title="Open all tabs">
              <i class="fas fa-external-link-square-alt"></i>
            </button>
            <button class="icon-btn add-tabs-btn" title="Add tabs">
              <i class="fas fa-plus"></i>
            </button>
            <button class="icon-btn edit-collection-btn" title="Edit collection name">
              <i class="fas fa-edit"></i>
            </button>
            <button class="icon-btn delete-collection-btn" title="Delete collection">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </div>
      </div>
      <div class="collection-tabs">
        <div class="collection-tab-search">
          <input type="text" class="collection-tab-search-input" placeholder="Search tabs…" autocomplete="off" spellcheck="false" />
          <button class="icon-btn import-tabs-btn" title="Import tabs (JSON)">
            <i class="fas fa-file-import"></i>
          </button>
          <button class="icon-btn export-tabs-btn" title="Export tabs (JSON)">
            <i class="fas fa-file-export"></i>
          </button>
          <div class="sort-tabs-container">
            <button class="icon-btn sort-tabs-btn" title="Sort Tabs">
              <i class="fas fa-sort"></i>
            </button>
            <div class="sort-dropdown-menu hidden">
              <div class="sort-option" data-value="custom"><i class="fas fa-grip-vertical"></i> Custom Order</div>
              <div class="sort-option" data-value="dateAddedNewest"><i class="fas fa-calendar-alt"></i> Date Added (Newest)</div>
              <div class="sort-option" data-value="dateAddedOldest"><i class="fas fa-calendar-day"></i> Date Added (Oldest)</div>
              <div class="sort-option" data-value="titleAsc"><i class="fas fa-sort-alpha-down"></i> Title (A-Z)</div>
              <div class="sort-option" data-value="titleDesc"><i class="fas fa-sort-alpha-up"></i> Title (Z-A)</div>
            </div>
          </div>
        </div>
        <div class="tabs-list">
          <!-- Tabs will be inserted here -->
        </div>
      </div>
    </div>
  </template>

  <template id="tabTemplate">
    <div class="tab-item" data-id="" draggable="false">
      <div class="tab-drag-handle drag-handle" title="Drag to reorder tab">
        <i class="fas fa-grip-vertical"></i>
      </div>
      <span class="tab-number"></span>
      <div class="tab-icon">
        <img class="tab-favicon-img" src="icons/icon16.png" alt="" onerror="this.src='icons/icon16.png';">
      </div>
      <div class="tab-content">
        <input type="text" class="tab-title" value="" placeholder="Untitled" readonly>
        <div class="tab-url" title=""></div>
      </div>
      <button class="icon-btn edit-tab-btn" title="Edit tab title">
        <i class="fas fa-edit"></i>
      </button>
      <button class="icon-btn open-tab-btn" title="Open tab">
        <i class="fas fa-external-link-alt"></i>
      </button>
      <button class="icon-btn remove-tab-btn" title="Remove tab">
        <i class="fas fa-times"></i>
      </button>
    </div>
  </template>

  <template id="openTabTemplate">
    <div class="open-tab-item">
      <label class="checkbox-label">
        <input type="checkbox" class="tab-checkbox" data-id="" data-title="" data-url="">
        <div class="open-tab-favicon-container">
          <img class="open-tab-favicon" src="icons/icon16.png" alt="" onerror="this.src='icons/icon16.png';">
        </div>
        <div class="open-tab-details">
          <span class="tab-title"></span>
          <span class="tab-url"></span>
        </div>
      </label>
    </div>
  </template>

  <script src="popup.js"></script>
</body>
</html>
